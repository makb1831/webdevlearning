<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image position</title>
    <style>
        *{ box-sizing: border-box; margin: 0; padding: 0; }
        .parent {
            position: relative;
            width: 100%;
            height: 500px;
        }
        .product {
            position: absolute;
            width: 50%;
            height: 50%;
        }
        .product:nth-child(1) {
            top: 0;
            left: 0;
        }
        .product:nth-child(2) {
            top: 0;
            right: 0;
        }
        .product:nth-child(3) {
            bottom: 0;
            left: 0;
        }
        .product:nth-child(4) {
            bottom: 0;
            right: 0;
        }
        .product img {
            width: 100%;
            height: 100%;
        }
        .product h3 {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
        }
        .parent1 {
            display: flex;
            flex-wrap: wrap;
            height: 700px;
        }
        .product1 {
            width: 50%;
            position: relative;
        }
        .product1 img {
            width: 100%;
            height: 100%;
        }
        .product1 h3 {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cGFyaXN8ZW58MHx8MHx8fDA%3D&auto=format&fit=crop&w=500&q=60" alt="Image 1">
            <h3>Image 1</h3>
        </div>
        <div class="product">

            <h3>Image 2</h3>
        </div>
        <div class="product">
