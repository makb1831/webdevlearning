<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #322d2d;
      --surface: #13131a;
      --border: #222230;
      --accent: #e8ff47;
      --accent2: #ff6b47;
      --accent3: #47c8ff;
      --text: #f9f9fc;
      --muted: #6b6b80;
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }
    /* ─── SECTION ─── */
    .section {
      max-width: 1100px;
      margin: 0 auto 100px;
      padding: 0 24px;
    }
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .section-label .num {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .15em;
      background: rgba(232,255,71,.08);
      border: 1px solid rgba(232,255,71,.2);
      padding: 4px 10px;
      border-radius: 6px;
    }
    .section-label h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .section-label p {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
    }

    /* ─── SLIDE IMAGES (CSS gradients as placeholder images) ─── */
    .img-1 { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%); }
    .img-2 { background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%); }
    .img-3 { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
    .img-4 { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
    .img-5 { background: linear-gradient(135deg, #360033 0%, #0b8793 100%); }

    .slide-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 60%);
    }
    .slide-content h3 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 6px;
      transform: translateY(0);
    }
    .slide-content p { font-size: 14px; color: rgba(255,255,255,.7); }
    .radio-slider {
      position: relative;
      width: 100%;
      height: 420px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .radio-slider input[type="radio"] { display: none; }

    .radio-slider .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity .6s ease, transform .6s ease;
      pointer-events: none;
    }
    #s1:checked ~ .slides .slide-1,
    #s2:checked ~ .slides .slide-2,
    #s3:checked ~ .slides .slide-3,
    #s4:checked ~ .slides .slide-4 {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    /* Arrow buttons as labels */
    .radio-slider .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 48px; height: 48px;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .2s;
      color: white;
      font-size: 18px;
      user-select: none;
    }
    .radio-slider .arrow:hover {
      background: rgba(232,255,71,.25);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-50%) scale(1.1);
    }
    .radio-slider .arrow-prev { left: 16px; }
    .radio-slider .arrow-next { right: 16px; }

    /* Arrow navigation labels */
    #s1:checked ~ .nav .prev-4,
    #s2:checked ~ .nav .prev-1,
    #s3:checked ~ .nav .prev-2,
    #s4:checked ~ .nav .prev-3 { display: flex; }
    #s1:checked ~ .nav .next-2,
    #s2:checked ~ .nav .next-3,
    #s3:checked ~ .nav .next-4,
    #s4:checked ~ .nav .next-1 { display: flex; }

    .radio-slider .nav label { display: none; }

    /* Dot nav */
    .radio-dots {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 20;
    }
    .radio-dots label {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      cursor: pointer;
      transition: all .3s;
      display: block;
    }
    #s1:checked ~ .radio-dots label[for="s1"],
    #s2:checked ~ .radio-dots label[for="s2"],
    #s3:checked ~ .radio-dots label[for="s3"],
    #s4:checked ~ .radio-dots label[for="s4"] {
      background: var(--accent);
      transform: scale(1.5);
    }
    </style>
</head>
<body>
    <div class="section">
    <div class="section-label">
      <span class="num">02</span>
      <h2>Arrow Button Slider</h2>
      <p>Click arrows to navigate</p>
    </div>

    <div class="radio-slider">
      <input type="radio" name="rs" id="s1" checked/>
      <input type="radio" name="rs" id="s2"/>
      <input type="radio" name="rs" id="s3"/>
      <input type="radio" name="rs" id="s4"/>

      <div class="slides">
        <div class="slide slide-1 img-1"><div class="slide-content"><h3>Northern Lights</h3><p>Slide 1 of 4</p></div></div>
        <div class="slide slide-2 img-3"><div class="slide-content"><h3>Desert Dunes</h3><p>Slide 2 of 4</p></div></div>
        <div class="slide slide-3 img-2"><div class="slide-content"><h3>Ocean Depths</h3><p>Slide 3 of 4</p></div></div>
        <div class="slide slide-4 img-4"><div class="slide-content"><h3>Midnight City</h3><p>Slide 4 of 4</p></div></div>
      </div>

      <div class="nav">
        <label for="s4" class="arrow arrow-prev prev-4">&#8592;</label>
        <label for="s3" class="arrow arrow-prev prev-3">&#8592;</label>
        <label for="s2" class="arrow arrow-prev prev-2">&#8592;</label>
        <label for="s1" class="arrow arrow-prev prev-1">&#8592;</label>

        <label for="s2" class="arrow arrow-next next-2">&#8594;</label>
        <label for="s3" class="arrow arrow-next next-3">&#8594;</label>
        <label for="s4" class="arrow arrow-next next-4">&#8594;</label>
        <label for="s1" class="arrow arrow-next next-1">&#8594;</label>
      </div>

      <div class="radio-dots">
        <label for="s1"></label>
        <label for="s2"></label>
        <label for="s3"></label>
        <label for="s4"></label>
      </div>
    </div>
  </div>
</body>
</html>
