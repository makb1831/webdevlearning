<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positioning Example</title>
<style>
/* RESET DEFAULT MARGINS */ 
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}
/* BODY */
body{
background-color:#f4f4f4;
}

</style>
</head>
<body>
    <section>
<h1>Positioning Example</h1>
<p>This is an example of how to use CSS positioning.</p>
<div style="background-color: lightblue; padding: 20px;">
    <p>This is a relatively positioned container.</p>
    <div style="position: absolute; top: 0px; left: 10px; background-color: lightcoral; padding: 10px;">
        This is an absolutely positioned box inside the relative container.
    </div>
</div>
    </section>
</body>
</html>
