<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rehmat Clothing Center</title>
        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family: Arial, sans-serif;
            }
            body{
                background-color:#ffffff;
                font-size: 16px;
            }
            .hero {
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:center;
                text-align:center;
                padding:50px;
                width: 100%;
                background-color: #555;
            }
            .herocontent {
                font-size: 36px;
                margin-bottom: 20px;
                width: 100%;
                
            }
            .hero img {
                width: 100%;
                height: auto;
                border-radius: 10px;
            }
            header{
                background:#222;
                color:white;
                text-align:center;
                font-size:12px;
                display:flex;
                flex-direction:row;
                align-items:center;
                justify-content:space-between;
                padding:20px;
            }
            header h1 {
                font-size: 25px;
            }
            header nav{
                display:flex;
                justify-content:center;
                justify-content:space-around;
                width: 50%;
            }
            header nav a{
                color:white;
                text-decoration:none;
                display:block;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Rehmat Clothing Center</h1>
            <nav>
                <a href="/examples/stor_p.html">Home</a>
                <a href="#">Products</a>

            </nav>
            <button style="background-color: #555; color: white; border: none; padding: 10px 20px; cursor: pointer;">Login</button>
        </header>
        <section class="hero">
                <div class="herocontent">
                <h1>Best Clothing Store in Jhang</h1>
                </div>
                <div>
                <img src="/images/makb proj upwork no 3.png" alt="Clothing Store" class="slider">
                </div>
            </section>
            <div style="font-size: 15px;">
                <h2 style="font-size: 1vh;">Our Products</h2>
                <p style="font-size: 16px;">Explore our wide range of clothing</p>
            </div>
    </body>
</html>
