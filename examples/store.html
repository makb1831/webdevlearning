<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Store</title>
<style>

/* RESET DEFAULT MARGINS */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}


/* BODY */

body{
background:#222;
}


/* HEADER */

header{
background:#222;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
position: sticky;
top: 10px;
width: 80%;
left: 10%;
border-radius: 10px;
margin-bottom: 15px;
}


/* NAVBAR */

nav{
display:flex;
justify-content:center;
background:#333;
}

nav a{
color:white;
text-decoration:none;
padding:15px 20px;
display:block;
}

nav a:hover{
background:#555;
}


/* HERO SECTION */

.hero{
background:url("https://picsum.photos/1200/400") center/cover no-repeat;
height:300px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
}


/* PRODUCTS SECTION */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}


/* PRODUCT CARD */

.product{
background:white;
width:220px;
border-radius:5px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
padding:15px;
text-align:center;
}


/* PRODUCT IMAGE */

.product img{
width:100%;
border-radius:5px;
}


/* PRODUCT TITLE */

.product h3{
margin:10px 0;
}


/* PRICE */

.price{
color:green;
font-weight:bold;
margin-bottom:10px;
}


/* BUTTON */

button{
background:black;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:3px;
}

button:hover{
background:#444;
}


/* FOOTER */

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}


/* RESPONSIVE DESIGN */

@media(max-width:750px){

.products{
flex-direction:column;
align-items:center;
}

.hero{
font-size:28px;
}

}

</style>

</head>



<body>


<header>
My Simple Store
</header>



<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>



<section class="hero">
Welcome to Our Shop
</section>



<section class="products">


<div class="product">

<img src="https://picsum.photos/200?1">

<h3>Running Shoes</h3>

<p class="price">$49</p>

<button>Add to Cart</button>

</div>



<div class="product">

<img src="https://picsum.photos/200?2">

<h3>Backpack</h3>

<p class="price">$35</p>

<button>Add to Cart</button>

</div>



<div class="product">

<img src="https://picsum.photos/200?3">

<h3>Smart Watch</h3>

<p class="price">$120</p>

<button>Add to Cart</button>

</div>



<div class="product">

<img src="https://picsum.photos/200?4">

<h3>Headphones</h3>

<p class="price">$60</p>

<button>Add to Cart</button>

</div>


</section>



<footer>
© 2026 My Store | All Rights Reserved
</footer>



</body>

</html>
